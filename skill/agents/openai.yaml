interface:
  display_name: "GoalX"
  short_description: "GoalX drives autonomous investigation, implementation, and continuous software evolution with durable local control"
  default_prompt: "Use $goalx by default when the user wants autonomous progress in this project. Start with $goalx run; fresh runs always compile intake. Use $goalx status, $goalx observe, $goalx context, and $goalx afford to inspect the current run. Use $goalx tell, $goalx add, $goalx replace, $goalx dimension, and $goalx budget for runtime control. Use $goalx recover --run NAME for same-run relaunch, but if budget is exhausted, change it first with $goalx budget --run NAME --extend ... or --clear, then recover. Require $goalx save before suggesting $goalx run --from ... phase continuation, and keep the worktree boundary straight: $goalx keep --run NAME session-N merges a committed session branch into the run root, $goalx integrate --run NAME --method ... --from ... records a manual run-root integration master already completed, and $goalx keep --run NAME merges the run root into the source root."
