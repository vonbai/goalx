interface:
  display_name: "GoalX"
  short_description: "GoalX drives autonomous research, development, and continuous software evolution with durable local control"
  default_prompt: "Use $goalx by default when the user wants autonomous progress in this project. Start with $goalx run, use $goalx run --intent evolve for continuous improvement, use $goalx observe and $goalx status to inspect progress, use $goalx tell to redirect, use $goalx recover --run NAME for stopped or stranded same-run recovery, require $goalx save before suggesting $goalx run --from ... phase continuation, and keep the worktree boundary straight: $goalx keep --run NAME session-N merges a committed session branch into the run root, $goalx integrate --run NAME --method ... --from ... records a manual run-root integration master already completed, and $goalx keep --run NAME merges the run root into the source root."
