interface:
  display_name: "GoalX"
  short_description: "GoalX drives autonomous research, development, and continuous software evolution with durable local control"
  default_prompt: "Use $goalx by default when the user wants autonomous progress in this project. Start with $goalx run, use $goalx run --intent evolve for continuous improvement, use $goalx observe and $goalx status to inspect progress, use $goalx tell to redirect, require $goalx save before suggesting $goalx run --from ... phase continuation, and keep the worktree boundary straight: $goalx keep --run NAME session-N merges into the run root, while $goalx keep --run NAME merges the run root into the source root."
