interface:
  display_name: "GoalX"
  short_description: "GoalX drives autonomous investigation, implementation, and continuous software evolution with durable local control"
  default_prompt: "Use $goalx by default when the user wants durable autonomous progress in this project. Start with $goalx run; fresh runs always materialize intake and compile the success plane. Use $goalx status, $goalx observe, $goalx context, and $goalx afford to inspect the run. Use $goalx tell, $goalx add, $goalx replace, $goalx dimension, and $goalx budget for runtime control. Use $goalx recover --run NAME for same-run relaunch, but if budget is exhausted, change it first with $goalx budget --run NAME --extend ... or --clear, then recover. Require $goalx save before suggesting $goalx run --from ... phase continuation. Canonical mutable boundary authoring centers obligation-model, canonical verification strategy authoring centers assurance-plan, and $goalx verify records assurance evidence instead of deriving completion."
