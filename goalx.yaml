# goalx.yaml — implement fixes from push-and-presets
name: implement
mode: develop
objective: 实施 push-and-presets 的共识修复清单。严格按照 context 中的文档执行，不做额外改动。
preset: default
engine: codex
model: codex
parallel: 2
diversity_hints:
    - 你负责优先级最高的修复项（P0 + P1 中不依赖其他文件的项）。逐个修复，每个修完跑一次 gate 验证。
    - 你负责剩余修复项（P2 + 重构类 P1）。先做独立的删除/清理，再做涉及多文件的重构。每步跑 gate。
target:
    files:
        - .
harness:
    command: go build ./... && go test ./... -count=1 && go vet ./...
context:
    files:
        - /data/dev/autoresearch/.goalx/runs/push-and-presets/session-1-report.md
        - /data/dev/autoresearch/.goalx/runs/push-and-presets/session-2-report.md
        - /data/dev/autoresearch/.goalx/runs/push-and-presets/session-3-report.md
        - /data/dev/autoresearch/.goalx/runs/push-and-presets/session-4-report.md
        - /data/dev/autoresearch/.goalx/runs/push-and-presets/session-5-report.md
budget:
    max_duration: 2h0m0s
master:
    engine: claude-code
    model: opus
